<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简单网页</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="vote-section">
      <div class="vote-header">
        <h2>冰棒和雪糕谁可爱</h2>
        <p>你可以投票选择你最可爱的图片。每个人仅有一次投票机会，上传图片仅限管理员。</p>
      </div>

      <div class="admin-panel">
        <label>管理员上传密码
          <input id="adminPassword" type="password" placeholder="输入密码以启用上传" />
        </label>
        <button id="unlockBtn">启用上传</button>
        <p class="admin-note">只有输入正确密码后，才会显示上传按钮。其他人无法直接上传。</p>
      </div>

      <div class="vote-grid">
        <div class="vote-card">
          <h3>冰棒</h3>
          <div class="image-preview" id="previewLeft">暂无图片</div>
          <input id="leftUpload" type="file" accept="image/*" style="display:none" />
          <button id="leftUploadBtn" class="upload-btn" disabled>上传冰棒图片</button>
          <button id="voteLeftBtn" class="vote-btn">投票给冰棒</button>
          <div class="vote-count">票数：<span id="countLeft">0</span></div>
        </div>

        <div class="vote-card">
          <h3>雪糕</h3>
          <div class="image-preview" id="previewRight">暂无图片</div>
          <input id="rightUpload" type="file" accept="image/*" style="display:none" />
          <button id="rightUploadBtn" class="upload-btn" disabled>上传雪糕图片</button>
          <button id="voteRightBtn" class="vote-btn">投票给雪糕</button>
          <div class="vote-count">票数：<span id="countRight">0</span></div>
        </div>
      </div>

      <div class="vote-status" id="voteStatus">你尚未投票，可以选择一个选项。</div>

      <div class="admin-count-panel" id="adminCountPanel" style="display:none">
        <h3>管理员票数管理</h3>
        <div class="count-edit">
          <label>冰棒票数
            <input id="countLeftInput" type="number" min="0" />
          </label>
          <button id="setLeftCountBtn" class="admin-btn">设置冰棒票数</button>
        </div>
        <div class="count-edit">
          <label>雪糕票数
            <input id="countRightInput" type="number" min="0" />
          </label>
          <button id="setRightCountBtn" class="admin-btn">设置雪糕票数</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 简单网页示例</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
